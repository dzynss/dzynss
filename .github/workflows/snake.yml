name: generate snake

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate monochrome snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: dzynss
          outputs: |
            dist/github-snake.svg?color_snake=%23F0F6FC&color_dots=%230D1117,%23161B22,%2330363D,%238B949E,%23F0F6FC
            dist/github-snake-dark.svg?color_snake=%23F0F6FC&color_dots=%23010409,%23161B22,%2330363D,%238B949E,%23F0F6FC

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
